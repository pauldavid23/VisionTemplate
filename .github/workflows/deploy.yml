name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vision_template
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vision_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Validate SQL (setup + migrations)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d vision_template -v ON_ERROR_STOP=1 -f db/setup.sql
          for f in db/migrations/*.sql; do
            [ -e "$f" ] || continue
            echo "Applying $f"
            psql -h localhost -U postgres -d vision_template -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/visiontemplate:${{ github.sha }}

      - name: Smoke test image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/visiontemplate:${{ github.sha }}"
          docker pull "$IMAGE"
          docker run --rm -d --name smoke -p 3000:3000 -e PORT=3000 "$IMAGE"
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/ping >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          docker logs smoke || true
          docker rm -f smoke >/dev/null 2>&1 || true
          if [ -z "$ok" ]; then
            echo "Smoke test failed: image did not serve /api/ping within 60s"
            exit 1
          fi
          echo "Smoke test passed."

      - name: Deploy to EC2
        id: deploy
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PAT,GHCR_ACTOR
          script: |
            set -e
            mkdir -p ~/visiontemplate
            cd ~/visiontemplate
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            rm -f .deploy-status
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/deploy.sh -o /tmp/deploy.sh
            chmod +x /tmp/deploy.sh
            /tmp/deploy.sh ghcr.io/${{ github.repository_owner }}/visiontemplate:${{ github.sha }}
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}

      - name: Report deploy outcome
        if: always()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          SHA=${GITHUB_SHA::7}
          # If the deploy step didn't run (a pre-deploy gate failed, so it was
          # skipped/cancelled), do NOT read the host status file — it would
          # reflect a PREVIOUS run. Report the CI failure instead.
          if [ "$DEPLOY_OUTCOME" != "success" ] && [ "$DEPLOY_OUTCOME" != "failure" ]; then
            echo "::error::CI failed before deploy (deploy step: ${DEPLOY_OUTCOME:-skipped}). Nothing was deployed; the server still runs the previous version."
            echo "### ❌ CI failed before deploy — nothing deployed. Server still on the previous version." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          printf '%s\n' "$EC2_SSH_KEY" > id_deploy
          chmod 600 id_deploy
          STATUS=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i id_deploy \
            "$EC2_USER@$EC2_HOST" 'cat ~/visiontemplate/.deploy-status 2>/dev/null' || true)
          rm -f id_deploy
          STATUS=${STATUS:-unknown}
          echo "Deploy status reported by host: $STATUS"
          case "$STATUS" in
            success)
              echo "### ✅ Deploy succeeded — now running \`$SHA\`" >> "$GITHUB_STEP_SUMMARY" ;;
            rolled-back)
              echo "::warning::Deploy of $SHA failed its health check and was ROLLED BACK to the previous build. Site is UP on the old version."
              echo "### ⚠️ Rolled back — \`$SHA\` failed, reverted to the previous build. **Site is UP** on the old version." >> "$GITHUB_STEP_SUMMARY" ;;
            migration-aborted|pull-failed|db-unhealthy)
              echo "::warning::Deploy of $SHA aborted ($STATUS) before swapping the app. The previous version is still running (site UP)."
              echo "### ⚠️ Deploy aborted (\`$STATUS\`) — app was **not** swapped, previous version still running (site UP)." >> "$GITHUB_STEP_SUMMARY" ;;
            down)
              echo "::error::Deploy of $SHA failed AND the rollback was also unhealthy. SITE IS DOWN — manual intervention required."
              echo "### ⛔ SITE DOWN — deploy and rollback both failed. Manual intervention required." >> "$GITHUB_STEP_SUMMARY" ;;
            no-previous)
              echo "::error::Deploy of $SHA failed and there was no previous known-good build to roll back to. Site is likely DOWN."
              echo "### ⛔ Deploy failed with no previous build to roll back to — site likely DOWN." >> "$GITHUB_STEP_SUMMARY" ;;
            *)
              echo "::error::Deploy of $SHA did not complete (host status: $STATUS). It likely failed before recording an outcome — check the Deploy step logs."
              echo "### ⛔ Deploy did not complete (\`$STATUS\`) — check the Deploy step logs." >> "$GITHUB_STEP_SUMMARY" ;;
          esac
