services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vision_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vision_template"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-visiontemplate:local}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vision_template?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/ping >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  backup:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vision_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
    volumes:
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "crontab -l 2>/dev/null; echo '0 2 * * * sh /usr/local/bin/backup-postgres.sh >> /var/log/backup-postgres.log 2>&1' | crontab - && crond -f"

volumes:
  postgres-data:
  postgres-backups:
